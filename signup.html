<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Signup | AI Crop Yield Platform</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(120deg, #43cea2, #185a9d);
      font-family: Arial, sans-serif;
    }
    .card {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      text-align: center;
    }
    h2 { margin-bottom: 10px; }
    p { color: #666; margin-bottom: 20px; }
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #185a9d;
      border: none;
      color: white;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #0f3c6e; }
    a { display: block; margin-top: 12px; text-decoration: none; color: #185a9d; }
    .error { color: red; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>📝 Create Account</h2>
    <p>Signup to use AI Crop Prediction</p>

    <form method="POST" action="/signup">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <input type="password" name="confirm_password" placeholder="Confirm Password" required />
      <button type="submit">Signup</button>
    </form>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <a href="/login">Already have an account? Login</a>
  </div>
</body>
</html>
